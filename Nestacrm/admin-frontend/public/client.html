<!DOCTYPE html>

<body>
  <header class="header">
    <div class="header-top-row">
      <div class="logo-wrapper">

  <main class="container">

      stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

  <div id="cartModal" class="cart-modal">
    <div class="cart-sheet">
      <div class="cart-header">
        <span><b data-i18n="alerts_cart_title">Savat</b></span>

      </div>

        <button onclick="sendOrder()" data-i18n="order_button">Buyurtma berish</button>

    </div>

  </div>
  </div>

    style="display: none; background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: var(--radius-lg); margin: 20px; box-shadow: var(--shadow-sm);">
    <div id="orderStatus"></div>
    <button id="requestBillBtn" onclick="requestBill()"
      style="width: 100%; background: var(--primary); color: #fff; padding: 14px; border: none; border-radius: 10px; font-weight: bold; margin-top: 16px; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s;">

  </div>

  <div id="notification" class="notification"></div>

  <div style="padding: 0 20px;">

  <button class="action-btn" onclick="window.openCheckoutModal()">
    <span data-i18n="request_bill">Hisob so'rash</span>

  <div id="checkout-modal" class="modal-overlay"
    style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.55);z-index:9999;align-items:flex-end;justify-content:center;padding:0;">
    <div id="checkout-inner"
      style="background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:0 0 env(safe-area-inset-bottom,0);box-shadow:0 -8px 40px rgba(0,0,0,0.18);animation:slideUp 0.28s cubic-bezier(.32,1.2,.55,1);max-height:92vh;display:flex;flex-direction:column;">
      <style>
        @keyframes slideUp {
          from {
            transform: translateY(100%);
            opacity: 0
          }

          to {
            transform: translateY(0);
            opacity: 1
          }
        }

        @keyframes fadeInCard {
          from {
            opacity: 0;
            transform: translateY(-6px)
          }

          to {
            opacity: 1;
            transform: translateY(0)
          }
        }

        @keyframes spinPay {
          0% {
            transform: rotate(0)
          }

          100% {
            transform: rotate(360deg)
          }
        }

        @keyframes popSuccess {
          0% {
            transform: scale(0);
            opacity: 0
          }

          70% {
            transform: scale(1.1)
          }

          100% {
            transform: scale(1);
            opacity: 1
          }
        }

        .co-method-btn {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 4px;
          padding: 10px 4px;
          border: 2px solid #e2e8f0;
          border-radius: 14px;
          cursor: pointer;
          background: #fff;
          font-size: 11px;
          font-weight: 700;
          color: #475569;
          transition: all .18s;
          min-width: 0;
        }

        .co-method-btn:hover {
          border-color: #22c55e;
          background: #f0fdf4;
        }

        .co-method-btn.co-active {
          border-color: #22c55e;
          background: #f0fdf4;
          color: #16a34a;
        }

        .co-method-icon {
          font-size: 20px;
          line-height: 1;
        }

        .co-card-form {
          padding: 14px;
          background: #f8fafc;
          border-radius: 14px;
          border: 1px solid #e2e8f0;
          animation: fadeInCard .2s ease;
          margin-top: 12px;
        }

        .co-input {
          width: 100%;
          box-sizing: border-box;
          padding: 11px 13px;
          border: 1.5px solid #e2e8f0;
          border-radius: 10px;
          font-size: 14px;
          color: #1e293b;
          background: #fff;
          outline: none;
          transition: border-color .15s;
          box-shadow: none;
        }

        .co-input:invalid {
          border-color: #e2e8f0;
          box-shadow: none;
        }

        .co-input:focus {
          border-color: #22c55e;
        }

        .co-input.co-err {
          border-color: #ef4444;
          animation: shake .25s;
        }

        @keyframes shake {

          0%,
          100% {
            transform: translateX(0)
          }

          25% {
            transform: translateX(-5px)
          }

          75% {
            transform: translateX(5px)
          }
        }

        .co-pay-btn {
          width: 100%;
          padding: 15px;
          border: none;
          border-radius: 14px;
          font-size: 16px;
          font-weight: 800;
          cursor: pointer;
          background: linear-gradient(135deg, #22c55e, #15803d);
          color: #fff;
          box-shadow: 0 4px 18px rgba(34, 197, 94, .32);
          transition: transform .15s, box-shadow .15s;
          letter-spacing: .3px;
        }

        .co-pay-btn:hover {
          transform: translateY(-1px);
          box-shadow: 0 7px 24px rgba(34, 197, 94, .42);
        }

        .co-pay-btn:active {
          transform: scale(.98);
        }

        .co-pay-btn:disabled {
          background: #94a3b8;
          box-shadow: none;
          cursor: not-allowed;
        }

        .co-item-row {
          display: flex;
          align-items: center;
          gap: 11px;
          padding: 11px 0;
          border-bottom: 1px solid #f1f5f9;
        }

        .co-item-row:last-child {
          border-bottom: none;
        }

        .co-item-img {
          width: 52px;
          height: 52px;
          border-radius: 10px;
          object-fit: cover;
          flex-shrink: 0;
          border: 1px solid #e2e8f0;
        }

        .co-item-img-placeholder {
          width: 52px;
          height: 52px;
          border-radius: 10px;
          background: #f8fafc;
          border: 1px solid #e2e8f0;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 20px;
          flex-shrink: 0;
        }

        .co-badge {
          font-size: 10px;
          padding: 2px 6px;
          border-radius: 5px;
          font-weight: 600;
        }

        .co-badge-cat {
          background: #f0fdf4;
          color: #16a34a;
          border: 1px solid #bbf7d0;
        }

        .co-badge-sub {
          background: #eff6ff;
          color: #3b82f6;
          border: 1px solid #bfdbfe;
        }
      </style>

      <!-- Handle bar -->

      <!-- Promo section -->

        <!-- Kartochkalar yoki select shu yerda dinamik render bo'ladi -->
        <div id="co-promo-cards" style="margin-bottom:6px;"></div>
        <!-- Input + strelka -->
        <div style="position:relative;">
          <input id="co-promo-input" type="text" placeholder="🎫 Promokod kiriting..."
            style="width:100%;box-sizing:border-box;padding:10px 46px 10px 13px;border:1.5px solid #e2e8f0;border-radius:11px;font-size:14px;color:#1e293b;background:#fff;outline:none;letter-spacing:.5px;transition:border-color .15s;"
            oninput="this.value=this.value.toUpperCase();"
            onfocus="this.style.borderColor='#22c55e'"

            style="position:absolute;right:7px;top:50%;transform:translateY(-50%);background:#22c55e;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800;line-height:1;transition:background .15s;"
            onmouseover="this.style.background='#16a34a'" onmouseout="this.style.background='#22c55e'">›</button>
        </div>
        <div id="co-promo-msg" style="font-size:12px;margin-top:5px;padding:0 2px;display:none;border-radius:6px;"></div>
      </div>

      <!-- Discount row -->
      <div id="co-discount-row" style="padding:0 20px;"></div>

      <!-- Total -->
      <div
        style="margin:10px 20px 0;background:#f0fdf4;border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:14px;color:#16a34a;font-weight:600;" data-i18n="total_sum">Jami:</span>
        <span style="font-size:20px;font-weight:800;color:#15803d;"><b id="checkout-final-price">0</b> so'm</span>
      </div>

      <!-- Payment methods -->
      <div style="padding:14px 20px 6px;">
        <p style="margin:0 0 10px;font-size:13px;font-weight:700;color:#475569;" data-i18n="select_method">To'lov
          usulini tanlang:</p>
        <div style="display:flex;gap:8px;" id="co-methods">
          <button class="co-method-btn co-active" onclick="window._coSelect('cash',this)">
            <span class="co-method-icon">💵</span><span data-i18n="cash">Naqd</span>
          </button>
          <button class="co-method-btn" onclick="window._coSelect('card',this)">
            <span class="co-method-icon">💳</span><span data-i18n="card">Karta</span>
          </button>
          <button class="co-method-btn" onclick="window._coSelect('click',this)">
            <span class="co-method-icon">🔵</span>Click
          </button>
          <button class="co-method-btn" onclick="window._coSelect('payme',this)">
            <span class="co-method-icon">🟢</span>Payme
          </button>
        </div>

        <div id="co-card-fields" style="display:none;">
          <div class="co-card-form">
            <p id="co-card-label" style="margin:0 0 10px;font-size:13px;font-weight:700;color:#334155;"
              data-i18n="card_details">💳 Karta ma'lumotlari</p>
            <input class="co-input" id="co-card-num" type="text" inputmode="numeric" placeholder="0000 0000 0000 0000"
              maxlength="19" autocomplete="off" novalidate
              oninput="let v=this.value.replace(/[^0-9]/g,'');v=v.replace(/(.{4})/g,'$1 ').trim().slice(0,19);this.value=v;"
              style="margin-bottom:9px;" autocomplete="new-password">
            <div style="display:flex;gap:8px;">
              <input class="co-input" id="co-card-exp" type="text" inputmode="numeric" placeholder="MM/YY" maxlength="5"
                autocomplete="off" novalidate
                oninput="let v=this.value.replace(/\D/g,'');if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);this.value=v;"
                autocomplete="new-password">
              <input class="co-input" id="co-card-cvv" type="text" inputmode="numeric" placeholder="CVV" maxlength="3"
                autocomplete="off" novalidate oninput="this.value=this.value.replace(/\D/g,'')"
                autocomplete="new-password">
            </div>
          </div>
        </div>
      </div>

      <div style="padding:10px 20px 20px;">
        <button class="co-pay-btn" id="co-pay-btn" onclick="window._coPay()">
          💸 <span data-i18n="pay_btn">To'lash</span> — <span id="co-btn-amount">0</span> <span
            data-i18n="currency">so'm</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ====== RESTORAN LOGOTIPI LOADER ====== -->
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const _fbCfg = {
      apiKey: "AIzaSyCGCCIP3eFg40bOEENDLGcrw9c484ySCHQ",
      authDomain: "restoran-30d51.firebaseapp.com",
      databaseURL: "https://restoran-30d51-default-rtdb.firebaseio.com",
      projectId: "restoran-30d51",
      storageBucket: "restoran-30d51.firebasestorage.app",
      messagingSenderId: "862261129762",
      appId: "1:862261129762:web:5577e6821b4ad7ea4e507b"
    };
    const _fbApp = getApps().length ? getApps()[0] : initializeApp(_fbCfg);
    const _db = getDatabase(_fbApp);

    function _applyLogo(url) {
      if (!url) return;
      document.querySelectorAll('#headerLogoImg, img.logo-img').forEach(img => {
        img.src = url;
        img.style.objectFit = 'contain';
        img.style.display = 'block';
      });
      const favicon = document.getElementById('faviconLink');
      if (favicon) favicon.href = url;
    }

    const _restId = new URLSearchParams(location.search).get("rest")
      || localStorage.getItem("restaurantId");

    if (_restId) {
      onValue(ref(_db, `restaurants/${_restId}/settings/restaurantLogoUrl`), snap => {
        if (snap.exists() && snap.val()) _applyLogo(snap.val());
      });
    }
  </script>


  <!-- Cart toggle fallback, dark theme enforcer & CSS version bump -->
  <script>
    // Ensure toggleCart works even before module scripts fully load
    window._cartOpen = false;
    function toggleCart() {
      var modal = document.getElementById('cartModal');
      if (!modal) return;
      window._cartOpen = !window._cartOpen;
      if (window._cartOpen) {
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
      } else {
        modal.classList.remove('open');
        document.body.style.overflow = '';
      }
    }

    // No-op: theme is now handled entirely by client.css and the
    // CSS variables injected by updateCart() in client.js.
    // Kept as a named stub so any existing call-sites don't throw.
    function applyCartDarkTheme() {}

    // Close on overlay click
    document.addEventListener('DOMContentLoaded', function() {
      var modal = document.getElementById('cartModal');
      if (modal) {
        modal.addEventListener('click', function(e) {
          if (e.target === modal) toggleCart();
        });
      }
    });
  </script>
