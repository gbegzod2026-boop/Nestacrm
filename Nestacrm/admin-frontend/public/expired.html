<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="expired_page_title">NestaCRM - Obuna muddati tugagan</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f4;
      --card: #ffffff;
      --text: #17211c;
      --muted: #52625a;
      --accent: #168a5f;
      --border: #dde7e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(22, 138, 95, 0.1), transparent 30%),
        linear-gradient(180deg, #fbfdfb 0%, var(--bg) 100%);
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(19, 46, 34, 0.11);
    }

    .logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      border-radius: 12px;
      background: transparent;
      padding: 10px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 38px);
    }

    p {
      margin: 0 0 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, #168a5f 0%, #0f6f4d 100%);
      color: #fff;
    }

    .btn-secondary {
      background: #e7f6ef;
      border-color: var(--border);
      color: var(--text);
    }

    .lang-select {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <select id="langSelect" class="lang-select" data-lang-select>
    <option value="uz" data-i18n="lang_uz">UZ</option>
    <option value="ru" data-i18n="lang_ru">RU</option>
    <option value="en" data-i18n="lang_en">EN</option>
  </select>

  <main class="card">
    <img class="logo" src="img/food-tech-logo.svg" alt="NestaCRM" data-i18n-alt="expired_logo_alt">
    <h1 data-i18n="expired_heading">Obuna muddati tugagan</h1>
    <p data-i18n="expired_desc">Ushbu restoran uchun obuna muddati yakunlangan. Tizimga kirishdan oldin obunani yangilash kerak bo'ladi.</p>
    <p data-i18n="expired_admin_note">Agar siz administrator bo'lsangiz, superadmin bilan bog'laning yoki qo'llanma sahifasini oching.</p>
    <div class="actions">
      <a class="btn btn-primary" href="login.html" data-i18n="expired_back_login">Login sahifasiga qaytish</a>
      <a class="btn btn-secondary" href="help.html" data-i18n="expired_help">Yordam sahifasi</a>
    </div>
  </main>

  <script type="module">
    import { applyLang, getLang, setLang } from "./js/i18n.js";

    document.addEventListener("DOMContentLoaded", () => {
      const langSelect = document.getElementById("langSelect");
      if (!langSelect) return;

      langSelect.value = getLang();
      applyLang();
      langSelect.addEventListener("change", event => setLang(event.target.value));
    });
  </script>
</body>
</html>
